basePath: /api/v1
definitions:
  vulun-scan-backend_internal_models.APIResponse:
    properties:
      code:
        description: HTTP状态码，如 "200", "400", "500"
        type: string
      data:
        description: 响应数据
      message:
        description: 响应消息
        type: string
      state:
        description: 业务状态，如 "success", "error"
        type: string
    type: object
  vulun-scan-backend_internal_models.BatchDeleteDomainsRequest:
    properties:
      domain_ids:
        items:
          type: integer
        type: array
      organization_id:
        type: integer
    required:
    - domain_ids
    - organization_id
    type: object
  vulun-scan-backend_internal_models.BatchDeleteDomainsResponseData:
    properties:
      failed_count:
        description: 失败的数量
        type: integer
      message:
        type: string
      success_count:
        description: 成功移除的数量
        type: integer
    type: object
  vulun-scan-backend_internal_models.BatchDeleteEndpointsRequest:
    properties:
      endpoint_ids:
        items:
          type: integer
        type: array
    required:
    - endpoint_ids
    type: object
  vulun-scan-backend_internal_models.BatchDeleteEndpointsResponseData:
    properties:
      deleted_count:
        type: integer
      message:
        type: string
    type: object
  vulun-scan-backend_internal_models.BatchDeleteOrgsRequest:
    properties:
      organization_ids:
        items:
          type: integer
        type: array
    required:
    - organization_ids
    type: object
  vulun-scan-backend_internal_models.BatchDeleteOrgsResponseData:
    properties:
      deleted_count:
        type: integer
      message:
        type: string
    type: object
  vulun-scan-backend_internal_models.BatchDeleteSubDomainsRequest:
    properties:
      subdomain_ids:
        items:
          type: integer
        type: array
    required:
    - subdomain_ids
    type: object
  vulun-scan-backend_internal_models.BatchDeleteSubDomainsResponseData:
    properties:
      deleted_count:
        type: integer
      message:
        type: string
    type: object
  vulun-scan-backend_internal_models.CreateDomainsRequest:
    properties:
      domains:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.DomainDetail'
        type: array
      organization_id:
        type: integer
    required:
    - domains
    - organization_id
    type: object
  vulun-scan-backend_internal_models.CreateEndpointsRequest:
    properties:
      endpoints:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.EndpointDetail'
        type: array
    required:
    - endpoints
    type: object
  vulun-scan-backend_internal_models.CreateEndpointsResponseData:
    properties:
      existing_endpoints:
        items:
          type: string
        type: array
      message:
        type: string
      success_count:
        type: integer
      total_requested:
        type: integer
    type: object
  vulun-scan-backend_internal_models.CreateOrgRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  vulun-scan-backend_internal_models.CreateSubDomainsForDomainRequest:
    properties:
      subdomains:
        items:
          type: string
        type: array
    required:
    - subdomains
    type: object
  vulun-scan-backend_internal_models.CreateSubDomainsResponseData:
    properties:
      already_exists:
        description: 已存在的子域名数量
        type: integer
      skipped_domains:
        description: 被跳过的根域名列表
        items:
          type: string
        type: array
      subdomains_created:
        description: 实际创建的子域名数量
        type: integer
      total_unique_subdomains:
        description: 请求的唯一子域名总数
        type: integer
    type: object
  vulun-scan-backend_internal_models.CreateToolRequest:
    properties:
      category_names:
        description: 工具分类标签数组
        items:
          type: string
        type: array
      description:
        type: string
      install_command:
        description: 安装命令（必填）
        type: string
      name:
        type: string
      repo_url:
        type: string
      update_command:
        description: 更新命令（必填）
        type: string
      version:
        type: string
      version_command:
        description: 版本查询命令（必填）
        type: string
    required:
    - install_command
    - name
    - update_command
    - version_command
    type: object
  vulun-scan-backend_internal_models.DeleteDomainResponseData:
    properties:
      message:
        type: string
    type: object
  vulun-scan-backend_internal_models.DeleteOrgRequest:
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  vulun-scan-backend_internal_models.DeleteOrgResponseData:
    properties:
      message:
        type: string
    type: object
  vulun-scan-backend_internal_models.Domain:
    properties:
      created_at:
        type: string
      description:
        type: string
      endpoints:
        description: 冗余关联
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Endpoint'
        type: array
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: |-
          核心业务字段
          注意：Name 字段在应用层已统一转为小写，数据库层通过 CHECK 约束防止插入大写值
        type: string
      organizations:
        description: 关联关系 - 级联删除配置在 OrganizationDomain 中间表定义
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Organization'
        type: array
      sub_domains:
        description: HasMany 关系 - 也需要配置级联删除，确保删除 Domain 时自动删除关联的 SubDomain、Endpoint
          和 Vulnerability
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.SubDomain'
        type: array
      updated_at:
        type: string
    type: object
  vulun-scan-backend_internal_models.DomainDetail:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  vulun-scan-backend_internal_models.DomainResponseData:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  vulun-scan-backend_internal_models.Endpoint:
    properties:
      content_length:
        type: integer
      created_at:
        type: string
      domain:
        allOf:
        - $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
        description: 冗余关联
      domain_id:
        description: 冗余字段，用于性能优化
        type: integer
      id:
        description: 数据库基础字段
        type: integer
      method:
        type: string
      status_code:
        type: integer
      subdomain:
        allOf:
        - $ref: '#/definitions/vulun-scan-backend_internal_models.SubDomain'
        description: |-
          关联关系
          BelongsTo 关系 - 在这里配置级联删除
      subdomain_id:
        description: |-
          关联字段 - 只读(创建后)
          <-:create 表示该字段只在创建时可写，创建后只读
        type: integer
      title:
        type: string
      updated_at:
        type: string
      url:
        description: 核心业务字段
        type: string
    type: object
  vulun-scan-backend_internal_models.EndpointDetail:
    properties:
      content_length:
        type: integer
      method:
        type: string
      status_code:
        type: integer
      title:
        type: string
      url:
        type: string
    required:
    - url
    type: object
  vulun-scan-backend_internal_models.GetAllDomainsResponse:
    properties:
      domains:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  vulun-scan-backend_internal_models.GetCategoriesResponse:
    properties:
      categories:
        description: 分类名称列表
        items:
          type: string
        type: array
      total:
        description: 分类数量
        type: integer
    type: object
  vulun-scan-backend_internal_models.GetEndpointsResponse:
    properties:
      endpoints:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Endpoint'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  vulun-scan-backend_internal_models.GetOrgDomainsResponse:
    properties:
      domains:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  vulun-scan-backend_internal_models.GetOrgsResponse:
    properties:
      organizations:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Organization'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  vulun-scan-backend_internal_models.GetSubDomainsResponse:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      sub_domains:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.SubDomain'
        type: array
      total:
        type: integer
    type: object
  vulun-scan-backend_internal_models.GetToolsResponse:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      tools:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Tool'
        type: array
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  vulun-scan-backend_internal_models.Organization:
    properties:
      created_at:
        type: string
      description:
        type: string
      domains:
        description: 关联关系 - 级联删除配置在 OrganizationDomain 中间表定义
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
        type: array
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: 核心业务字段
        type: string
      updated_at:
        type: string
    type: object
  vulun-scan-backend_internal_models.SubDomain:
    properties:
      created_at:
        type: string
      domain:
        allOf:
        - $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
        description: |-
          关联关系
          BelongsTo 关系 - 在这里配置级联删除
      domain_id:
        type: integer
      endpoints:
        description: HasMany 关系 - 也需要配置级联删除，确保删除 SubDomain 时自动删除关联的 Endpoint 和 Vulnerability
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Endpoint'
        type: array
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: |-
          核心业务字段
          注意：Name 字段在应用层已统一转为小写，数据库层通过 CHECK 约束防止插入大写值
          <-:create 表示该字段只在创建时可写，创建后只读
        type: string
      updated_at:
        type: string
    type: object
  vulun-scan-backend_internal_models.Tool:
    properties:
      category_names:
        description: 工具分类标签数组
        items:
          type: string
        type: array
      created_at:
        type: string
      description:
        type: string
      id:
        description: 数据库基础字段
        type: integer
      install_command:
        description: 安装命令
        type: string
      name:
        description: 核心业务字段
        type: string
      repo_url:
        type: string
      update_command:
        description: 更新命令
        type: string
      updated_at:
        type: string
      version:
        type: string
      version_command:
        description: 版本查询命令
        type: string
    type: object
  vulun-scan-backend_internal_models.ToolResponseData:
    properties:
      tool:
        $ref: '#/definitions/vulun-scan-backend_internal_models.Tool'
    type: object
  vulun-scan-backend_internal_models.UpdateDomainRequest:
    properties:
      description:
        description: 指针类型：nil=不更新，空字符串=清空，有值=更新
        type: string
      id:
        type: integer
      name:
        description: 指针类型：nil=不更新，空字符串=清空，有值=更新
        type: string
    required:
    - id
    type: object
  vulun-scan-backend_internal_models.UpdateOrgRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    required:
    - id
    type: object
info:
  contact: {}
  description: 漏洞扫描系统后端 API 文档
  title: Vulun Scan Backend API
  version: "1.0"
paths:
  /categories:
    get:
      description: 从工具表中获取所有已使用的分类名称（去重）
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.GetCategoriesResponse'
              type: object
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 获取所有工具分类
      tags:
      - 工具管理
  /domains:
    get:
      description: 获取系统中的所有域名，支持分页和排序
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - default: updated_at
        description: 排序字段
        enum:
        - name
        - created_at
        - updated_at
        in: query
        name: sort_by
        type: string
      - default: desc
        description: 排序方向
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.GetAllDomainsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 获取所有域名列表
      tags:
      - 域名管理
  /domains/{id}:
    get:
      description: 根据域名ID获取域名的详细信息（包含组织关联信息）
      parameters:
      - description: 域名ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
              type: object
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 获取单个域名详情
      tags:
      - 域名管理
  /domains/{id}/subdomains:
    get:
      description: 根据域名ID获取该域名下的所有子域名（支持分页和排序）
      parameters:
      - description: 域名ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      - description: 页码,默认1
        in: query
        name: page
        type: integer
      - description: 每页数量,默认10
        in: query
        name: page_size
        type: integer
      - description: '排序字段: id, name, created_at, updated_at,默认updated_at'
        in: query
        name: sort_by
        type: string
      - description: '排序方向: asc, desc,默认desc'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.GetSubDomainsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 获取域名的子域名列表
      tags:
      - 域名管理
  /domains/{id}/subdomains/create:
    post:
      consumes:
      - application/json
      description: 为指定域名批量创建子域名，只需验证子域名是否属于该域名
      parameters:
      - description: 域名ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      - description: 子域名列表
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.CreateSubDomainsForDomainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.CreateSubDomainsResponseData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 为指定域名批量创建子域名
      tags:
      - 域名管理
  /domains/create:
    post:
      consumes:
      - application/json
      description: |-
        批量创建域名并自动关联到指定组织（支持单个或多个域名）

        **幂等性行为说明：**
        - 如果域名已存在，会复用现有域名并建立新的关联关系
        - 如果域名与组织的关联已存在，会跳过（不会报错）
        - 每个新创建的域名会自动创建一个同名的根子域名
        - 重复提交相同的域名是安全的，不会产生重复数据

        **业务场景：**
        - 适用于从外部导入域名列表
        - 支持多个组织共享同一个域名
        - 域名在数据库中全局唯一，通过中间表实现多对多关系
      parameters:
      - description: 域名创建请求，包含域名列表和组织ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.CreateDomainsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功，返回创建的域名列表（包括新创建和已存在的）
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
                  type: array
              type: object
        "400":
          description: 请求参数错误（如域名列表为空、参数格式错误等）
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "404":
          description: 指定的组织不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 批量创建域名
      tags:
      - 域名管理
  /domains/update:
    post:
      consumes:
      - application/json
      description: |-
        更新域名信息（名称和描述），返回更新后的域名信息（不包含组织关联信息）

        **字段更新说明：**
        - name: 传null不更新，传空字符串会报错（域名不能为空），传值则更新
        - description: 传null不更新，传空字符串清空，传值则更新
        - 至少需要更新一个字段，否则直接返回原数据
      parameters:
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.UpdateDomainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.DomainResponseData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 更新域名
      tags:
      - 域名管理
  /endpoints:
    get:
      description: 获取所有端点，支持分页和排序
      parameters:
