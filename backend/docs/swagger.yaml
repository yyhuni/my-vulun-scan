basePath: /api/v1
definitions:
  vulun-scan-backend_internal_models.APIResponse:
    properties:
      code:
        description: HTTP状态码，如 "200", "400", "500"
        type: string
      data:
        description: 响应数据
      message:
        description: 响应消息
        type: string
      state:
        description: 业务状态，如 "success", "error"
        type: string
    type: object
  vulun-scan-backend_internal_models.BatchDeleteOrgsRequest:
    properties:
      organization_ids:
        items:
          type: integer
        type: array
    required:
    - organization_ids
    type: object
  vulun-scan-backend_internal_models.BatchDeleteOrgsResponseData:
    properties:
      deleted_count:
        type: integer
      message:
        type: string
      organizations:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Organization'
        type: array
    type: object
  vulun-scan-backend_internal_models.CreateDomainsRequest:
    properties:
      domains:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.DomainDetail'
        type: array
      organization_id:
        type: integer
    required:
    - domains
    - organization_id
    type: object
  vulun-scan-backend_internal_models.CreateOrgRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  vulun-scan-backend_internal_models.CreateSubDomainsRequest:
    properties:
      domain_id:
        type: integer
      sub_domains:
        items:
          type: string
        type: array
    required:
    - domain_id
    - sub_domains
    type: object
  vulun-scan-backend_internal_models.CreateSubDomainsResponseData:
    properties:
      existing_domains:
        items:
          type: string
        type: array
      message:
        type: string
      success_count:
        type: integer
      total_requested:
        type: integer
    type: object
  vulun-scan-backend_internal_models.DeleteOrgRequest:
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  vulun-scan-backend_internal_models.DeleteOrgResponseData:
    properties:
      message:
        type: string
    type: object
  vulun-scan-backend_internal_models.Domain:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: 核心业务字段
        type: string
      organizations:
        description: 关联关系 - 级联删除配置在 OrganizationDomain 中间表定义
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Organization'
        type: array
      sub_domains:
        description: SubDomain 的级联删除：删除 Domain 时自动删除其所有子域名
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.SubDomain'
        type: array
      updated_at:
        type: string
    type: object
  vulun-scan-backend_internal_models.DomainDetail:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  vulun-scan-backend_internal_models.GetOrgDomainsResponse:
    properties:
      domains:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  vulun-scan-backend_internal_models.GetOrgsResponse:
    properties:
      organizations:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Organization'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  vulun-scan-backend_internal_models.GetSubDomainsResponse:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      sub_domains:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.SubDomain'
        type: array
      total:
        type: integer
    type: object
  vulun-scan-backend_internal_models.Organization:
    properties:
      created_at:
        type: string
      description:
        type: string
      domains:
        description: 关联关系 - 级联删除配置在 OrganizationDomain 中间表定义
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
        type: array
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: 核心业务字段
        type: string
      updated_at:
        type: string
    type: object
  vulun-scan-backend_internal_models.RemoveOrgDomainRequest:
    properties:
      domain_id:
        type: integer
      organization_id:
        type: integer
    required:
    - domain_id
    - organization_id
    type: object
  vulun-scan-backend_internal_models.RemoveOrgDomainResponseData:
    properties:
      message:
        type: string
    type: object
  vulun-scan-backend_internal_models.SubDomain:
    properties:
      created_at:
        type: string
      domain:
        allOf:
        - $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
        description: 关联关系
      domain_id:
        type: integer
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: 核心业务字段
        type: string
      updated_at:
        type: string
    type: object
  vulun-scan-backend_internal_models.UpdateDomainRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    required:
    - id
    type: object
  vulun-scan-backend_internal_models.UpdateOrgRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    required:
    - id
    type: object
info:
  contact: {}
  description: 漏洞扫描系统后端 API 文档
  title: Vulun Scan Backend API
  version: "1.0"
paths:
  /domains/{id}:
    get:
      description: 根据域名ID获取域名的详细信息（不包含子域名）
      parameters:
      - description: 域名ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
              type: object
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 获取单个域名详情
      tags:
      - 域名管理
  /domains/{id}/subdomains:
    get:
      description: 根据域名ID获取该域名下的所有子域名（支持分页和排序）
      parameters:
      - description: 域名ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      - description: 页码,默认1
        in: query
        name: page
        type: integer
      - description: 每页数量,默认10
        in: query
        name: page_size
        type: integer
      - description: '排序字段: id, name, created_at, updated_at,默认updated_at'
        in: query
        name: sort_by
        type: string
      - description: '排序方向: asc, desc,默认desc'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.GetSubDomainsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 获取域名的子域名列表
      tags:
      - 域名管理
  /domains/create:
    post:
      consumes:
      - application/json
      description: 批量创建域名并自动关联到指定组织（支持单个或多个域名）。如果域名已存在，会复用现有域名并建立关联关系
      parameters:
      - description: 域名创建请求，包含域名列表和组织ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.CreateDomainsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功，返回创建的域名列表
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
                  type: array
              type: object
        "400":
          description: 请求参数错误（如域名列表为空、参数格式错误等）
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 批量创建域名
      tags:
      - 域名管理
  /domains/remove-from-organization:
    post:
      consumes:
      - application/json
      description: 解除指定组织与域名的关联关系，如果域名成为孤儿（没有任何组织关联）则自动删除该域名
      parameters:
      - description: 解除关联请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.RemoveOrgDomainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 解除关联成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.RemoveOrgDomainResponseData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "404":
          description: 组织、域名或关联不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 解除组织与域名的关联（待实现完善）
      tags:
      - 域名管理
  /domains/update:
    post:
      consumes:
      - application/json
      description: 更新域名信息（名称和描述）
      parameters:
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.UpdateDomainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.Domain'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 更新域名
      tags:
      - 域名管理
  /organizations:
    get:
      description: 获取所有组织列表，支持分页和排序
      parameters:
      - default: 1
        description: 页码
        example: 1
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        example: 10
        in: query
        name: page_size
        type: integer
      - default: updated_at
        description: 排序字段
        enum:
        - id
        - name
        - created_at
        - updated_at
        in: query
        name: sort_by
        type: string
      - default: desc
        description: 排序方向
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.GetOrgsResponse'
              type: object
        "422":
          description: 请求参数验证失败
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 获取组织列表
      tags:
      - 组织管理
  /organizations/{id}:
    get:
      description: 根据组织ID获取组织的详细信息
      parameters:
      - description: 组织ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.Organization'
              type: object
        "404":
          description: 组织不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 获取单个组织详情
      tags:
      - 组织管理
  /organizations/{id}/domains:
    get:
      description: 获取指定组织的所有域名，支持分页和排序。注意：返回的域名不包含子域名信息
      parameters:
      - description: 组织ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - default: updated_at
        description: 排序字段
        enum:
        - name
        - created_at
        - updated_at
        in: query
        name: sort_by
        type: string
      - default: desc
        description: 排序方向
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.GetOrgDomainsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 获取组织的域名列表
      tags:
      - 域名管理
  /organizations/{id}/subdomains:
    get:
      description: 根据组织ID获取该组织所有域名下的子域名（支持分页和排序）
      parameters:
      - description: 组织ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      - description: 页码,默认1
        in: query
        name: page
        type: integer
      - description: 每页数量,默认10
        in: query
        name: page_size
        type: integer
      - description: '排序字段: id, name, created_at, updated_at,默认updated_at'
        in: query
        name: sort_by
        type: string
      - description: '排序方向: asc, desc,默认desc'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.GetSubDomainsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "404":
          description: 组织不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 获取组织的子域名列表
      tags:
      - 组织管理
  /organizations/batch-delete:
    post:
      consumes:
      - application/json
      description: 批量删除组织（级联删除关联的域名和孤儿域名）
      parameters:
      - description: 组织ID列表
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.BatchDeleteOrgsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 批量删除成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.BatchDeleteOrgsResponseData'
              type: object
        "400":
          description: 业务逻辑错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "422":
          description: 请求参数验证失败
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 批量删除组织（待实现完善）
      tags:
      - 组织管理
  /organizations/create:
    post:
      consumes:
      - application/json
      description: 创建新的组织
      parameters:
      - description: 组织信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.CreateOrgRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.Organization'
              type: object
        "422":
          description: 请求参数验证失败
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 创建组织
      tags:
      - 组织管理
  /organizations/delete:
    post:
      consumes:
      - application/json
      description: 删除指定的组织（级联删除关联的域名和孤儿域名）
      parameters:
      - description: 删除请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.DeleteOrgRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.DeleteOrgResponseData'
              type: object
        "404":
          description: 组织不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "422":
          description: 请求参数验证失败
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 删除组织（待实现完善）
      tags:
      - 组织管理
  /organizations/update:
    post:
      consumes:
      - application/json
      description: 更新组织信息
      parameters:
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.UpdateOrgRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/vulun-scan-backend_internal_models.Organization'
              type: object
        "404":
          description: 组织不存在
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "422":
          description: 请求参数验证失败
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/vulun-scan-backend_internal_models.APIResponse'
      summary: 更新组织
      tags:
      - 组织管理
  /subdomains:
    get:
      description: 获取所有子域名，支持分页和排序
      parameters:
      - description: 页码,默认1
        in: query
        name: page
        type: integer
      - description: 每页数量,默认10
        in: query
