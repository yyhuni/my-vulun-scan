basePath: /api/v1
definitions:
  models.APIResponse:
    properties:
      code:
        description: HTTP状态码，如 "200", "400", "500"
        type: string
      data:
        description: 响应数据
      message:
        description: 响应消息
        type: string
      state:
        description: 业务状态，如 "success", "error"
        type: string
    type: object
  models.BatchDeleteOrganizationsRequest:
    properties:
      organization_ids:
        items:
          type: integer
        type: array
    required:
    - organization_ids
    type: object
  models.BatchDeleteOrganizationsResponseData:
    properties:
      deleted_count:
        type: integer
      message:
        type: string
      organizations:
        items:
          $ref: '#/definitions/models.Organization'
        type: array
    type: object
  models.CreateDomainsRequest:
    properties:
      domains:
        items:
          $ref: '#/definitions/models.DomainDetail'
        type: array
      organization_id:
        type: integer
    required:
    - domains
    - organization_id
    type: object
  models.CreateOrganizationRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  models.CreateSubDomainsRequest:
    properties:
      domain_id:
        type: integer
      sub_domains:
        items:
          type: string
        type: array
    required:
    - domain_id
    - sub_domains
    type: object
  models.CreateSubDomainsResponseData:
    properties:
      existing_domains:
        items:
          type: string
        type: array
      message:
        type: string
      success_count:
        type: integer
      total_requested:
        type: integer
    type: object
  models.DeleteOrganizationRequest:
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  models.DeleteOrganizationResponseData:
    properties:
      message:
        type: string
    type: object
  models.Domain:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: 核心业务字段
        type: string
      organizations:
        description: 关联关系 - 级联删除配置在 OrganizationDomain 中间表定义
        items:
          $ref: '#/definitions/models.Organization'
        type: array
      sub_domains:
        description: SubDomain 的级联删除：删除 Domain 时自动删除其所有子域名
        items:
          $ref: '#/definitions/models.SubDomain'
        type: array
      updated_at:
        type: string
    type: object
  models.DomainDetail:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  models.GetOrganizationDomainsResponse:
    properties:
      domains:
        items:
          $ref: '#/definitions/models.Domain'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  models.GetOrganizationsResponse:
    properties:
      organizations:
        items:
          $ref: '#/definitions/models.Organization'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  models.GetSubDomainsResponse:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      sub_domains:
        items:
          $ref: '#/definitions/models.SubDomain'
        type: array
      total:
        type: integer
    type: object
  models.Organization:
    properties:
      created_at:
        type: string
      description:
        type: string
      domains:
        description: 关联关系 - 级联删除配置在 OrganizationDomain 中间表定义
        items:
          $ref: '#/definitions/models.Domain'
        type: array
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: 核心业务字段
        type: string
      updated_at:
        type: string
    type: object
  models.RemoveOrganizationDomainRequest:
    properties:
      domain_id:
        type: integer
      organization_id:
        type: integer
    required:
    - domain_id
    - organization_id
    type: object
  models.RemoveOrganizationDomainResponseData:
    properties:
      message:
        type: string
    type: object
  models.SubDomain:
    properties:
      created_at:
        type: string
      domain:
        allOf:
        - $ref: '#/definitions/models.Domain'
        description: 关联关系
      domain_id:
        type: integer
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: 核心业务字段
        type: string
      updated_at:
        type: string
    type: object
  models.UpdateOrganizationRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    required:
    - id
    type: object
info:
  contact: {}
  description: 漏洞扫描系统后端 API 文档
  title: Vulun Scan Backend API
  version: "1.0"
paths:
  /domains:
    get:
      description: 支持按ID查询单个域名、按组织ID查询域名列表、分页和排序等
      parameters:
      - description: 域名ID(查询单个域名时使用)
        in: query
        name: id
        type: integer
      - description: 组织ID(查询组织下域名列表时使用)
        in: query
        name: organization_id
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - default: updated_at
        description: 排序字段
        enum:
        - name
        - created_at
        - updated_at
        in: query
        name: sort_by
        type: string
      - default: desc
        description: 排序方向
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取域名列表成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.GetOrganizationDomainsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取域名信息(支持多种查询方式)
      tags:
      - 域名管理
  /domains/create:
    post:
      consumes:
      - application/json
      description: 批量创建域名并关联到指定组织
      parameters:
      - description: 域名创建请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateDomainsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Domain'
                  type: array
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 批量创建域名
      tags:
      - 域名管理
  /domains/remove-from-organization:
    post:
      consumes:
      - application/json
      description: 解除指定组织与域名的关联关系，如果域名成为孤儿（没有任何组织关联）则自动删除该域名
      parameters:
      - description: 解除关联请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RemoveOrganizationDomainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 解除关联成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.RemoveOrganizationDomainResponseData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: 组织、域名或关联不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 解除组织与域名的关联
      tags:
      - 域名管理
  /organizations:
    get:
      description: 支持按ID查询单个组织、获取组织列表、分页和排序等
      parameters:
      - description: 组织ID(查询单个组织时使用)
        in: query
        name: id
        type: integer
      - description: 页码,默认1
        in: query
        name: page
        type: integer
      - description: 每页数量,默认10
        in: query
        name: page_size
        type: integer
      - description: '排序字段: id, name, created_at, updated_at,默认updated_at'
        in: query
        name: sort_by
        type: string
      - description: '排序方向: asc, desc,默认desc'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取组织列表成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.GetOrganizationsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: 组织不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取组织信息(支持多种查询方式)
      tags:
      - 组织管理
  /organizations/batch-delete:
    post:
      consumes:
      - application/json
      description: 批量删除组织（级联删除关联的域名和孤儿域名）
      parameters:
      - description: 组组ID列表
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.BatchDeleteOrganizationsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 批量删除成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.BatchDeleteOrganizationsResponseData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 批量删除组织
      tags:
      - 组织管理
  /organizations/create:
    post:
      consumes:
      - application/json
      description: 创建新的组织
      parameters:
      - description: 组织信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateOrganizationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Organization'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 创建组织
      tags:
      - 组织管理
  /organizations/delete:
    post:
      consumes:
      - application/json
      description: 删除指定的组织（级联删除关联的域名和孤儿域名）
      parameters:
      - description: 删除请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.DeleteOrganizationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.DeleteOrganizationResponseData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: 组织不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 删除组织
      tags:
      - 组织管理
  /organizations/update:
    post:
      consumes:
      - application/json
      description: 更新组织信息
      parameters:
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateOrganizationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Organization'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: 组织不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 更新组织
      tags:
      - 组织管理
  /subdomains:
    get:
      description: 支持按ID查询单个子域名、按域名ID筛选、分页查询和排序等
      parameters:
      - description: 子域名ID(查询单个子域名时使用)
        in: query
        name: id
        type: integer
      - description: 域名ID(筛选指定域名下的子域名)
        in: query
        name: domain_id
        type: integer
      - description: 页码,默认1
        in: query
        name: page
        type: integer
      - description: 每页数量,默认10
        in: query
        name: page_size
        type: integer
      - description: '排序字段: id, name, created_at, updated_at,默认updated_at'
        in: query
        name: sort_by
        type: string
      - description: '排序方向: asc, desc,默认desc'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取子域名列表成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.GetSubDomainsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: 子域名不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取子域名信息(支持多种查询方式)
      tags:
      - 子域名管理
  /subdomains/create:
    post:
      consumes:
      - application/json
      description: 批量创建子域名并关联到指定域名
      parameters:
      - description: 子域名创建请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateSubDomainsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.CreateSubDomainsResponseData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 批量创建子域名
      tags:
      - 子域名管理
swagger: "2.0"
