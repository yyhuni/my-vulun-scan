basePath: /api/v1
definitions:
  models.APIResponse:
    properties:
      code:
        description: HTTP状态码，如 "200", "400", "500"
        type: string
      data:
        description: 响应数据
      message:
        description: 响应消息
        type: string
      state:
        description: 业务状态，如 "success", "error"
        type: string
    type: object
  models.BatchDeleteOrgsRequest:
    properties:
      organization_ids:
        items:
          type: integer
        type: array
    required:
    - organization_ids
    type: object
  models.BatchDeleteOrgsResponseData:
    properties:
      deleted_count:
        type: integer
      message:
        type: string
      organizations:
        items:
          $ref: '#/definitions/models.Organization'
        type: array
    type: object
  models.CreateDomainsRequest:
    properties:
      domains:
        items:
          $ref: '#/definitions/models.DomainDetail'
        type: array
      organization_id:
        type: integer
    required:
    - domains
    - organization_id
    type: object
  models.CreateEndpointsRequest:
    properties:
      endpoints:
        items:
          $ref: '#/definitions/models.EndpointDetail'
        type: array
      subdomain_id:
        type: integer
    required:
    - endpoints
    - subdomain_id
    type: object
  models.CreateEndpointsResponseData:
    properties:
      existing_endpoints:
        items:
          type: string
        type: array
      message:
        type: string
      success_count:
        type: integer
      total_requested:
        type: integer
    type: object
  models.CreateOrgRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  models.CreateSubDomainsRequest:
    properties:
      domain_groups:
        items:
          $ref: '#/definitions/models.DomainGroup'
        type: array
      organization_id:
        type: integer
    required:
    - domain_groups
    - organization_id
    type: object
  models.CreateSubDomainsResponseData:
    properties:
      already_exists:
        description: 已存在的子域名数量
        type: integer
      skipped_domains:
        description: 被跳过的根域名列表
        items:
          type: string
        type: array
      subdomains_created:
        description: 实际创建的子域名数量
        type: integer
      total_unique_subdomains:
        description: 请求的唯一子域名总数
        type: integer
    type: object
  models.DeleteDomainResponseData:
    properties:
      message:
        type: string
    type: object
  models.DeleteOrgRequest:
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  models.DeleteOrgResponseData:
    properties:
      message:
        type: string
    type: object
  models.Domain:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: 核心业务字段
        type: string
      organizations:
        description: 关联关系 - 级联删除配置在 OrganizationDomain 中间表定义
        items:
          $ref: '#/definitions/models.Organization'
        type: array
      sub_domains:
        description: HasMany 关系 - 级联删除由子表的 BelongsTo 关系配置
        items:
          $ref: '#/definitions/models.SubDomain'
        type: array
      updated_at:
        type: string
      vulnerabilities:
        items:
          $ref: '#/definitions/models.Vulnerability'
        type: array
    type: object
  models.DomainDetail:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  models.DomainGroup:
    properties:
      root_domain:
        type: string
      subdomains:
        items:
          type: string
        type: array
    required:
    - root_domain
    - subdomains
    type: object
  models.Endpoint:
    properties:
      content_length:
        type: integer
      created_at:
        type: string
      id:
        description: 数据库基础字段
        type: integer
      method:
        type: string
      status_code:
        type: integer
      subdomain:
        allOf:
        - $ref: '#/definitions/models.SubDomain'
        description: |-
          关联关系
          BelongsTo 关系 - 在这里配置级联删除
      subdomain_id:
        type: integer
      title:
        type: string
      updated_at:
        type: string
      url:
        description: 核心业务字段
        type: string
      vulnerabilities:
        description: HasMany 关系 - 级联删除由子表的 BelongsTo 关系配置
        items:
          $ref: '#/definitions/models.Vulnerability'
        type: array
    type: object
  models.EndpointDetail:
    properties:
      content_length:
        type: integer
      method:
        type: string
      status_code:
        type: integer
      title:
        type: string
      url:
        type: string
    required:
    - url
    type: object
  models.GetEndpointsResponse:
    properties:
      endpoints:
        items:
          $ref: '#/definitions/models.Endpoint'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  models.GetOrgDomainsResponse:
    properties:
      domains:
        items:
          $ref: '#/definitions/models.Domain'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  models.GetOrgsResponse:
    properties:
      organizations:
        items:
          $ref: '#/definitions/models.Organization'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  models.GetSubDomainsResponse:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      sub_domains:
        items:
          $ref: '#/definitions/models.SubDomain'
        type: array
      total:
        type: integer
    type: object
  models.Organization:
    properties:
      created_at:
        type: string
      description:
        type: string
      domains:
        description: 关联关系 - 级联删除配置在 OrganizationDomain 中间表定义
        items:
          $ref: '#/definitions/models.Domain'
        type: array
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: 核心业务字段
        type: string
      updated_at:
        type: string
    type: object
  models.SubDomain:
    properties:
      created_at:
        type: string
      domain:
        allOf:
        - $ref: '#/definitions/models.Domain'
        description: |-
          关联关系
          BelongsTo 关系 - 在这里配置级联删除
      domain_id:
        type: integer
      endpoints:
        description: HasMany 关系 - 级联删除由子表的 BelongsTo 关系配置
        items:
          $ref: '#/definitions/models.Endpoint'
        type: array
      id:
        description: 数据库基础字段
        type: integer
      name:
        description: 核心业务字段
        type: string
      updated_at:
        type: string
      vulnerabilities:
        items:
          $ref: '#/definitions/models.Vulnerability'
        type: array
    type: object
  models.UpdateDomainRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    required:
    - id
    type: object
  models.UpdateOrgRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    required:
    - id
    type: object
  models.Vulnerability:
    properties:
      affected_url:
        type: string
      created_at:
        type: string
      curl_command:
        type: string
      cve:
        type: string
      cvss:
        type: number
      cvss_metrics:
        type: string
      description:
        type: string
      discovered_date:
        description: 发现和状态信息
        type: string
      domain_id:
        type: integer
      domain_name:
        description: 优化字段 - 冗余域名名称减少联表查询
        type: string
      domain_relation:
        allOf:
        - $ref: '#/definitions/models.Domain'
        description: 关联关系
      endpoint_id:
        type: integer
      endpoint_relation:
        $ref: '#/definitions/models.Endpoint'
      extracted_results:
        description: 扫描结果
        items:
          type: string
        type: array
      hackerone_report_id:
        description: 外部集成
        type: string
      http_url:
        type: string
      id:
        description: 数据库基础字段
        type: integer
      impact:
        type: string
      is_gpt_used:
        type: boolean
      open_status:
        type: boolean
      organization:
        description: 组织信息
        type: string
      organization_id:
        type: string
      poc:
        description: 技术细节
        type: string
      port:
        type: integer
      remediation:
        type: string
      request:
        type: string
      response:
        type: string
      risk_score:
        type: integer
      scan_history_id:
        description: 扫描历史
        type: integer
      service:
        type: string
      severity:
        description: -1:unknown, 0:info, 1:low, 2:medium, 3:high, 4:critical
        type: integer
      solution:
        type: string
      status:
        type: string
      subdomain_id:
        description: 关联关系 - 灵活归属
        type: integer
      subdomain_relation:
        $ref: '#/definitions/models.SubDomain'
      target_domain:
        type: string
      title:
        description: 核心漏洞信息
        type: string
      type:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact: {}
  description: 漏洞扫描系统后端 API 文档
  title: Vulun Scan Backend API
  version: "1.0"
paths:
  /domains/{id}:
    get:
      description: 根据域名ID获取域名的详细信息（不包含子域名）
      parameters:
      - description: 域名ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Domain'
              type: object
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取单个域名详情
      tags:
      - 域名管理
  /domains/{id}/subdomains:
    get:
      description: 根据域名ID获取该域名下的所有子域名（支持分页和排序）
      parameters:
      - description: 域名ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      - description: 页码,默认1
        in: query
        name: page
        type: integer
      - description: 每页数量,默认10
        in: query
        name: page_size
        type: integer
      - description: '排序字段: id, name, created_at, updated_at,默认updated_at'
        in: query
        name: sort_by
        type: string
      - description: '排序方向: asc, desc,默认desc'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.GetSubDomainsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取域名的子域名列表
      tags:
      - 域名管理
  /domains/create:
    post:
      consumes:
      - application/json
      description: 批量创建域名并自动关联到指定组织（支持单个或多个域名）。如果域名已存在，会复用现有域名并建立关联关系
      parameters:
      - description: 域名创建请求，包含域名列表和组织ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateDomainsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功，返回创建的域名列表
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Domain'
                  type: array
              type: object
        "400":
          description: 请求参数错误（如域名列表为空、参数格式错误等）
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 批量创建域名
      tags:
      - 域名管理
  /domains/update:
    post:
      consumes:
      - application/json
      description: 更新域名信息（名称和描述）
      parameters:
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateDomainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Domain'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: 域名不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 更新域名
      tags:
      - 域名管理
  /endpoints:
    get:
      description: 获取所有端点，支持分页和排序
      parameters:
      - description: 页码,默认1
        in: query
        name: page
        type: integer
      - description: 每页数量,默认10
        in: query
        name: page_size
        type: integer
      - description: '排序字段: url, method, status_code, created_at, updated_at,默认updated_at'
        in: query
        name: sort_by
        type: string
      - description: '排序方向: asc, desc,默认desc'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.GetEndpointsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取所有端点列表
      tags:
      - 端点管理
  /endpoints/{id}:
    get:
      description: 根据端点ID获取端点详情
      parameters:
      - description: 端点ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Endpoint'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: 端点不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取端点详情
      tags:
      - 端点管理
  /endpoints/create:
    post:
      consumes:
      - application/json
      description: 批量创建端点，支持单个或多个端点创建，必须关联到指定子域名。subdomain_id 为必填字段
      parameters:
      - description: 端点创建请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateEndpointsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.CreateEndpointsResponseData'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 批量创建端点
      tags:
      - 端点管理
  /organizations:
    get:
      description: 获取所有组织列表，支持分页和排序
      parameters:
      - default: 1
        description: 页码
        example: 1
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        example: 10
        in: query
        name: page_size
        type: integer
      - default: updated_at
        description: 排序字段
        enum:
        - id
        - name
        - created_at
        - updated_at
        in: query
        name: sort_by
        type: string
      - default: desc
        description: 排序方向
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.GetOrgsResponse'
              type: object
        "422":
          description: 请求参数验证失败
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取组织列表
      tags:
      - 组织管理
  /organizations/{id}:
    get:
      description: 根据组织ID获取组织的详细信息
      parameters:
      - description: 组织ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Organization'
              type: object
        "404":
          description: 组织不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取单个组织详情
      tags:
      - 组织管理
  /organizations/{id}/domains:
    get:
      description: 获取指定组织的所有域名，支持分页和排序。注意：返回的域名不包含子域名信息
      parameters:
      - description: 组织ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - default: updated_at
        description: 排序字段
        enum:
        - name
        - created_at
        - updated_at
        in: query
        name: sort_by
        type: string
      - default: desc
        description: 排序方向
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.GetOrgDomainsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取组织的域名列表
      tags:
      - 域名管理
  /organizations/{id}/subdomains:
    get:
      description: 根据组织ID获取该组织所有域名下的子域名（支持分页和排序）
      parameters:
      - description: 组织ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      - description: 页码,默认1
        in: query
        name: page
        type: integer
      - description: 每页数量,默认10
        in: query
        name: page_size
        type: integer
      - description: '排序字段: id, name, created_at, updated_at,默认updated_at'
        in: query
        name: sort_by
        type: string
      - description: '排序方向: asc, desc,默认desc'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.GetSubDomainsResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: 组织不存在
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: 获取组织的子域名列表
      tags:
      - 组织管理
  /organizations/{organization_id}/domains/{domain_id}:
    delete:
      description: 解除指定组织与域名的关联关系，如果域名成为孤儿（没有任何组织关联）则自动删除该域名
      parameters:
      - description: 组织ID
        example: 1
        in: path
        name: organization_id
        required: true
        type: integer
      - description: 域名ID
        example: 2
        in: path
        name: domain_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.DeleteDomainResponseData'
              type: object
