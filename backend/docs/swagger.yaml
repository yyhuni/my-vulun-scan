basePath: /api/v1
definitions:
  vulun-scan-backend_internal_models.CreateDomainsRequest:
    properties:
      domains:
        items:
          $ref: '#/definitions/vulun-scan-backend_internal_models.DomainDetail'
        type: array
      organization_id:
        type: integer
    required:
    - domains
    - organization_id
    type: object
  vulun-scan-backend_internal_models.CreateOrganizationRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  vulun-scan-backend_internal_models.CreateSubDomainsRequest:
    properties:
      domain_id:
        type: integer
      sub_domains:
        items:
          type: string
        type: array
    required:
    - domain_id
    - sub_domains
    type: object
  vulun-scan-backend_internal_models.DeleteOrganizationRequest:
    properties:
      id:
        type: integer
    required:
    - id
    type: object
  vulun-scan-backend_internal_models.DomainDetail:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  vulun-scan-backend_internal_models.UpdateOrganizationRequest:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    required:
    - id
    type: object
info:
  contact: {}
  description: 漏洞扫描系统后端 API 文档
  title: Vulun Scan Backend API
  version: "1.0"
paths:
  /domains/{id}:
    get:
      description: 根据域名ID获取域名的详细信息，包括关联的子域名
      parameters:
      - description: 域名ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 域名不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取域名详情
      tags:
      - 域名管理
  /domains/create:
    post:
      consumes:
      - application/json
      description: 批量创建域名并关联到指定组织
      parameters:
      - description: 域名创建请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.CreateDomainsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 批量创建域名
      tags:
      - 域名管理
  /organizations:
    get:
      description: 返回组织列表,支持分页查询和排序
      parameters:
      - description: 页码,默认1
        in: query
        name: page
        type: integer
      - description: 每页数量,默认10
        in: query
        name: page_size
        type: integer
      - description: '排序字段: id, name, created_at, updated_at,默认updated_at'
        in: query
        name: sort_by
        type: string
      - description: '排序方向: asc, desc,默认desc'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回列表数据
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取组织列表
      tags:
      - 组织管理
  /organizations/{id}:
    get:
      description: 根据组织ID获取组织的详细信息
      parameters:
      - description: 组织ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 组织不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取组织详情
      tags:
      - 组织管理
  /organizations/batch-delete:
    post:
      consumes:
      - application/json
      description: 批量删除多个组织及其关联数据
      parameters:
      - description: 组织ID列表
        in: body
        name: request
        required: true
        schema:
          properties:
            organization_ids:
              items:
                type: integer
              type: array
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 批量删除成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 批量删除组织
      tags:
      - 组织管理
  /organizations/create:
    post:
      consumes:
      - application/json
      description: 根据请求体创建一个新组织
      parameters:
      - description: 组织信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.CreateOrganizationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 创建组织
      tags:
      - 组织管理
  /organizations/delete:
    post:
      consumes:
      - application/json
      description: 删除指定组织及其关联数据
      parameters:
      - description: 删除请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.DeleteOrganizationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 组织不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 删除组织
      tags:
      - 组织管理
  /organizations/update:
    post:
      consumes:
      - application/json
      description: 更新指定组织的名称和描述信息
      parameters:
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.UpdateOrganizationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 组织不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 更新组织
      tags:
      - 组织管理
  /sub-domains/create:
    post:
      consumes:
      - application/json
      description: 批量创建子域名并关联到指定域名
      parameters:
      - description: 子域名创建请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/vulun-scan-backend_internal_models.CreateSubDomainsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 批量创建子域名
      tags:
      - 子域名管理
swagger: "2.0"
