# Prefect 部署配置文件
# 用于定义 Prefect Server 和 Worker 的配置

# Prefect API 配置
prefect-version: 2.14.21
name: scanner-backend

# 工作池配置
work_pools:
  - name: scan-pool
    type: process
    concurrency_limit: null  # 扫描任务池：不限总并发，实际由各 Worker 的 limit 控制
    description: 扫描任务工作池
  - name: maintenance-pool
    type: process
    concurrency_limit: 10    # 维护任务池：限制总并发，保证系统资源
    description: 维护任务工作池（清理、删除等）

# 部署配置
deployments:
  - name: cleanup-old-scans-daily
    entrypoint: deployments/cleanup_deployment.py:cleanup_old_scans_flow
    work_pool:
      name: maintenance-pool
    schedule:
      cron: "0 2 * * *"
      timezone: "Asia/Shanghai"
    tags:
      - maintenance
      - cleanup
      - scheduled

# 存储配置（可选）
storage:
  # 使用本地文件系统存储
  type: local
  path: /Users/yangyang/Desktop/scanner/backend

# 环境变量
env:
  DJANGO_SETTINGS_MODULE: config.settings
  PREFECT_API_URL: ${PREFECT_API_URL:-http://localhost:4200/api}

