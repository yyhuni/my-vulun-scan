version: '3.8'

# ============================================
# 基础设施服务配置
# ============================================
# 包含项目所需的基础设施服务（Redis、监控等）
# 这些服务需要持续运行，为后端应用提供支持

services:
  # ==========================================
  # Redis 服务（任务队列 & 缓存）
  # ==========================================
  redis:
    # 使用 Redis 7 Alpine 版本（轻量级）
    image: redis:7-alpine
    
    # 容器名称
    container_name: vulun-redis
    
    # 容器内主机名
    hostname: vulun-redis
    
    # 端口映射：宿主机:容器
    # 后端通过 localhost:6379 访问
    ports:
      - "6379:6379"
    
    # 数据持久化卷
    volumes:
      # Redis 数据目录（AOF 和 RDB 文件）
      - redis-data:/data
      
      # 可选：自定义配置文件
      # - ./redis.conf:/usr/local/etc/redis/redis.conf
    
    # 启动命令
    # --appendonly yes: 启用 AOF 持久化，确保数据不丢失
    command: redis-server --appendonly yes
    
    # 重启策略
    # unless-stopped: 除非手动停止，否则总是重启
    restart: unless-stopped
    
    # 健康检查
    healthcheck:
      # 使用 redis-cli ping 检查 Redis 是否正常
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s    # 每 10 秒检查一次
      timeout: 3s      # 超时时间 3 秒
      retries: 3       # 失败 3 次后标记为 unhealthy
      start_period: 5s # 启动后等待 5 秒再开始检查
    
    # 网络配置
    networks:
      - vulun-network
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"  # 单个日志文件最大 10MB
        max-file: "3"    # 保留最近 3 个日志文件
    
    # 环境变量（可选）
    environment:
      - TZ=Asia/Shanghai  # 设置时区

# ============================================
# 数据卷定义
# ============================================
volumes:
  # Redis 数据卷
  # 用于持久化 Redis 数据（AOF 和 RDB 文件）
  redis-data:
    driver: local

# ============================================
# 网络定义
# ============================================
networks:
  # 应用网络
  # 所有服务（后端、Redis 等）都连接到此网络
  vulun-network:
    driver: bridge
    name: vulun-network
