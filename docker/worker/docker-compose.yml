# 远程 Worker 独立部署
# 使用方法：
#   1. 复制 .env.example -> .env
#   2. 修改 .env 中的远程主机配置
#   3. docker compose up -d --build

services:
  scan-worker:
    build:
      context: ../..
      dockerfile: docker/worker/Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - PREFECT_WORK_POOL_NAME=${PREFECT_SCAN_WORK_POOL_NAME:-scan-pool}
    volumes:
      - ../../backend/logs:/app/backend/logs
      - ../../backend/results:/app/backend/results

  maintenance-worker:
    build:
      context: ../..
      dockerfile: docker/worker/Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - PREFECT_WORK_POOL_NAME=${PREFECT_MAINTENANCE_WORK_POOL_NAME:-maintenance-pool}
    volumes:
      - ../../backend/logs:/app/backend/logs
      - ../../backend/results:/app/backend/results
