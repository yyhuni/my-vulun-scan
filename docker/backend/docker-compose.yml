version: '3.8'

# ============================================
# 后端服务配置（Django + Celery Workers）
# ============================================
# 包含 Django API 服务和多个 Celery worker 实例
# 实现队列隔离和资源优化

services:
  # ==========================================
  # Django API 服务
  # ==========================================
  backend:
    build:
      context: ../../backend
      dockerfile: ../docker/backend/Dockerfile
    
    container_name: vulun-backend
    hostname: vulun-backend
    
    # 端口映射
    ports:
      - "8000:8000"
    
    # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      
      # Django 配置
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-default-key}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      
      # 数据库配置
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-xingrin}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      
      # Celery 配置
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    
    # 数据卷
    volumes:
      # 代码挂载（开发环境）
      - ../../backend:/app
      
      # 扫描结果目录
      - scan-results:/scan_results
    
    # 工作目录
    working_dir: /app
    
    # 启动命令
    command: python manage.py runserver 0.0.0.0:8000
    
    # 依赖服务
    depends_on:
      redis:
        condition: service_healthy
    
    # 重启策略
    restart: unless-stopped
    
    # 网络配置
    networks:
      - vulun-network
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  # ==========================================
  # Celery Worker - Orchestrator 队列
  # ==========================================
  # 特点：轻量级编排任务、高并发、快速响应
  celery-orchestrator:
    build:
      context: ../../backend
      dockerfile: ../docker/backend/Dockerfile
    
    container_name: vulun-celery-orchestrator
    hostname: celery-orchestrator
    
    # 环境变量（与 backend 相同）
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-default-key}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-xingrin}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    
    # 数据卷
    volumes:
      - ../../backend:/app
      - scan-results:/scan_results
    
    working_dir: /app
    
    # 启动命令
    # -Q orchestrator: 只监听 orchestrator 队列
    # -c 50: 高并发（50 个并发进程）
    # --prefetch-multiplier 2: 预取 2 个任务（提高吞吐量）
    # -n orchestrator@%h: worker 名称
    # --loglevel info: 日志级别
    command: >
      celery -A config worker
      -Q orchestrator
      -c 50
      --prefetch-multiplier 2
      -n orchestrator@%h
      --loglevel info
    
    # 依赖服务
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    
    # 重启策略
    restart: unless-stopped
    
    # 网络配置
    networks:
      - vulun-network
    
    # 健康检查
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping", "-d", "orchestrator@celery-orchestrator"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  # ==========================================
  # Celery Worker - Scans 队列
  # ==========================================
  # 特点：重量级扫描任务、限制并发、资源隔离
  celery-scans:
    build:
      context: ../../backend
      dockerfile: ../docker/backend/Dockerfile
    
    container_name: vulun-celery-scans
    hostname: celery-scans
    
    # 环境变量（与 backend 相同）
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-default-key}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-xingrin}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    
    # 数据卷
    volumes:
      - ../../backend:/app
      - scan-results:/scan_results
    
    working_dir: /app
    
    # 启动命令
    # -Q scans: 只监听 scans 队列
    # -c 10: 中等并发（10 个并发进程，避免资源耗尽）
    # --prefetch-multiplier 1: 只预取 1 个任务（避免长任务堆积）
    # -n scans@%h: worker 名称
    # --loglevel info: 日志级别
    command: >
      celery -A config worker
      -Q scans
      -c 10
      --prefetch-multiplier 1
      -n scans@%h
      --loglevel info
    
    # 依赖服务
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    
    # 重启策略
    restart: unless-stopped
    
    # 网络配置
    networks:
      - vulun-network
    
    # 资源限制（可选）
    # 限制 CPU 和内存使用，防止扫描任务占用过多资源
    deploy:
      resources:
        limits:
          cpus: '4'      # 最多使用 4 个 CPU 核心
          memory: 8G     # 最多使用 8GB 内存
        reservations:
          cpus: '2'      # 保证至少有 2 个 CPU 核心
          memory: 4G     # 保证至少有 4GB 内存
    
    # 健康检查
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping", "-d", "scans@celery-scans"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  # ==========================================
  # Celery Beat（定时任务调度器）
  # ==========================================
  # 可选：用于执行定时扫描任务
  celery-beat:
    build:
      context: ../../backend
      dockerfile: ../docker/backend/Dockerfile
    
    container_name: vulun-celery-beat
    hostname: celery-beat
    
    # 环境变量（与 backend 相同）
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-default-key}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-xingrin}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    
    # 数据卷
    volumes:
      - ../../backend:/app
      - celery-beat-schedule:/app/celerybeat-schedule
    
    working_dir: /app
    
    # 启动命令
    command: celery -A config beat --loglevel info
    
    # 依赖服务
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    
    # 重启策略
    restart: unless-stopped
    
    # 网络配置
    networks:
      - vulun-network
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# 数据卷定义
# ============================================
volumes:
  # 扫描结果存储卷
  scan-results:
    driver: local
  
  # Celery Beat 调度数据卷
  celery-beat-schedule:
    driver: local

# ============================================
# 网络定义
# ============================================
networks:
  # 使用外部网络（由 infrastructure/docker-compose.yml 创建）
  vulun-network:
    external: true
    name: vulun-network

