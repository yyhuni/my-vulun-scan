# ============================================
# Docker Compose 配置文件版本
# ============================================
# version: 指定 Docker Compose 文件格式版本
# 3.8 是目前广泛支持的稳定版本，支持大部分功能
version: '3.8'

# ============================================
# 服务定义
# ============================================
# services: 定义要运行的所有容器服务
# 这里只有一个服务：vulun-scanner（安全扫描工具容器）
services:
  # 服务名称：vulun-scanner
  # 可以通过这个名称在命令中引用，如：docker-compose exec vulun-scanner bash
  xingrin:
    
    # ----------------------------------------
    # 镜像构建配置
    # ----------------------------------------
    build:
      # context: 构建上下文路径（Dockerfile 所在目录）
      # . 表示当前目录（docker-compose.yml 所在目录）
      context: .
      
      # dockerfile: 指定使用哪个 Dockerfile 文件
      # 如果你有多个 Dockerfile，可以在这里指定具体的文件名
      dockerfile: Dockerfile
    
    # ----------------------------------------
    # 容器基础配置
    # ----------------------------------------
    # container_name: 容器的名称（在 docker ps 中看到的名称）
    # 不指定的话会自动生成类似 docker_xingrin_1 的名称
    container_name: xingrin
    
    # hostname: 容器内部的主机名（在容器内执行 hostname 命令看到的）
    # 有些工具会依赖主机名，所以最好设置一个
    hostname: xingrin
    
    # ----------------------------------------
    # 交互式终端配置
    # ----------------------------------------
    # stdin_open: 保持标准输入打开
    # 相当于 docker run -i 参数
    # 作用：允许你向容器发送输入，比如在容器中运行交互式程序
    stdin_open: true
    
    # tty: 分配一个伪终端（pseudo-TTY）
    # 相当于 docker run -t 参数
    # 作用：让容器表现得像一个真实的终端，支持颜色输出、光标控制等
    # 通常与 stdin_open 一起使用，实现完整的交互式体验
    tty: true
    
    # ----------------------------------------
    # 网络模式配置
    # ----------------------------------------
    # network_mode: 容器的网络模式
    # 
    # 可选值：
    # - bridge: 桥接模式（默认），容器有独立的网络栈和 IP
    #          适用于大多数场景，容器之间可以互相通信
    #          容器端口需要通过端口映射才能被宿主机访问
    # 
    # - host: 主机模式，容器直接使用宿主机的网络
    #        适用于需要直接访问宿主机网络的场景（如网络扫描）
    #        性能更好，但安全性较低，端口冲突需要手动避免
    # 
    # - none: 无网络，容器完全隔离
    # 
    # 建议：
    # - 普通使用：保持 bridge
    # - 网络扫描、需要访问宿主机网络：改为 host
    network_mode: bridge
    
    # ----------------------------------------
    # 特权和权限配置
    # ----------------------------------------
    # privileged: 特权模式
    # 
    # false: 容器以非特权模式运行（推荐，更安全）
    #        大多数安全工具在非特权模式下也能正常工作
    # 
    # true: 容器获得宿主机的几乎所有权限（不推荐，除非必要）
    #       容器可以访问所有设备、修改内核参数等
    #       只在某些特殊工具（如 Docker-in-Docker）时才需要
    # 
    # 建议：保持 false，使用下面的 cap_add 添加特定权限
    privileged: false
    
    # cap_add: 添加 Linux 能力（Capabilities）
    # 
    # 这是比 privileged 更精细的权限控制方式
    # 只给容器它真正需要的权限，而不是所有权限
    # 
    # 常用能力：
    # - NET_ADMIN: 网络管理权限（配置网络接口、路由表等）
    # - NET_RAW: 原始套接字权限（发送原始网络包，如 ICMP、TCP SYN）
    # - SYS_ADMIN: 系统管理权限（挂载文件系统等，谨慎使用）
    # - SYS_PTRACE: 进程跟踪权限（调试其他进程）
    # 
    # 为什么需要这些：
    # - nmap 的 SYN 扫描需要 NET_RAW
    # - masscan 需要 NET_RAW 和 NET_ADMIN
    # - ping 命令需要 NET_RAW（发送 ICMP 包）
    cap_add:
      - NET_ADMIN  # 网络管理权限
      - NET_RAW    # 原始套接字权限（nmap、masscan 等工具需要）
    
    # ----------------------------------------
    # 环境变量配置
    # ----------------------------------------
    # environment: 设置容器内的环境变量
    # 
    # 两种写法：
    # 1. 数组格式：- KEY=VALUE
    # 2. 键值对格式：KEY: VALUE
    # 
    # 可以使用 ${VAR} 引用 .env 文件中的变量
    environment:
      # TZ: 时区设置
      # Asia/Shanghai 表示中国上海时区（UTC+8）
      # 作用：让容器内的时间显示正确，日志时间戳准确
      - TZ=Asia/Shanghai
      
      # LANG 和 LC_ALL: 语言和字符集设置
      # C.UTF-8 表示使用 UTF-8 编码
      # 作用：确保中文等非 ASCII 字符正确显示，避免乱码
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      
      # 自定义环境变量（根据需要取消注释并修改）
      # 这些变量会从 .env 文件中读取，如果 .env 文件中没有定义，则使用这里的默认值
      # - API_KEY=${API_KEY}              # API 密钥（某些扫描工具需要）
      # - TARGET_DOMAIN=${TARGET_DOMAIN}  # 目标域名
      # - SCAN_MODE=full                  # 扫描模式
    
    # ----------------------------------------
    # 卷挂载配置（数据持久化）
    # ----------------------------------------
    # volumes: 将宿主机的目录或文件挂载到容器内
    # 
    # 格式：宿主机路径:容器路径[:权限]
    # - ro: 只读（read-only），容器内不能修改
    # - rw: 读写（默认），容器内可以修改
    # 
    # 为什么需要卷挂载：
    # 1. 数据持久化：容器删除后数据不会丢失
    # 2. 方便访问：可以在宿主机上直接查看/编辑文件
    # 3. 共享数据：多个容器可以挂载同一个卷
    # 
    # 注意：当前已注释掉所有绑定挂载，数据只存在于容器内
    # 如果需要持久化数据或在宿主机访问文件，请取消相应注释
    volumes:
      # ===== 绑定挂载（已注释） =====
      # 如果需要在宿主机访问容器内的文件，取消下面的注释
      
      # 主工作目录
      # 容器内所有工作文件都保存在这里
      # 宿主机路径：./workspace（相对于 docker-compose.yml 的位置）
      # 容器内路径：/workspace
      # - ./workspace:/workspace
      
      # 工具安装目录
      # 用于存放手动安装或下载的安全工具
      # - ./tools:/tools
      
      # 扫描结果输出目录
      # 所有扫描工具的输出结果都保存在这里
      # 方便在宿主机上查看和分析
      # - ./output:/workspace/output
      
      # 配置文件目录
      # 存放工具的配置文件（如 nuclei 的模板配置、nmap 的扫描配置等）
      # - ./config:/workspace/config
      
      # 字典文件目录
      # 存放密码字典、目录字典等（用于暴力破解、目录扫描等）
      # 例如：rockyou.txt、common.txt、subdomains.txt
      # - ./wordlists:/workspace/wordlists
      
      # 自定义脚本目录
      # 存放你自己编写的扫描脚本、自动化脚本等
      # - ./scripts:/workspace/scripts
      
      # ===== 命名卷（保留） =====
      # 这些卷由 Docker 内部管理，不映射到宿主机特定路径
      
      # Go 模块缓存（命名卷）
      # 存放 Go 下载的第三方包
      # 作用：避免每次重建容器都要重新下载，大大加快构建速度
      # go-cache 是命名卷，数据存储在 Docker 管理的位置
      - go-cache:/root/go/pkg/mod
      
      # 工具配置持久化（命名卷）
      # 存放工具的配置和缓存（如 nuclei 的模板缓存）
      # 避免每次重启容器都要重新下载
      - tool-config:/root/.config
    
    # ----------------------------------------
    # 资源限制配置（可选）
    # ----------------------------------------
    # deploy.resources: 限制容器使用的系统资源
    # 
    # 为什么需要：
    # - 防止单个容器占用过多资源影响系统
    # - 控制成本（在云环境中）
    # - 保证多个容器公平使用资源
    # 
    # 注意：这个配置在 docker-compose 中需要 Swarm 模式才能生效
    # 如果要在单机 docker-compose 中限制资源，建议使用 docker run 的 --cpus 和 --memory 参数
    # 或者使用 Docker Compose v2.x 的 deploy 语法
    # 
    # 根据实际情况调整，建议：
    # - 开发环境：不限制或限制宽松
    # - 生产环境：根据实际资源情况限制
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '4'        # CPU 限制：最多使用 4 个 CPU 核心
    #       memory: 8G       # 内存限制：最多使用 8GB 内存
    #     reservations:
    #       cpus: '2'        # CPU 预留：保证至少有 2 个 CPU 核心可用
    #       memory: 4G       # 内存预留：保证至少有 4GB 内存可用
    
    # ----------------------------------------
    # 重启策略配置
    # ----------------------------------------
    # restart: 容器退出后的重启策略
    # 
    # 可选值：
    # - no: 不自动重启（默认）
    # - always: 总是重启，无论退出码是什么
    # - on-failure: 只有异常退出（退出码非 0）时才重启
    # - unless-stopped: 总是重启，除非手动停止容器
    # 
    # 推荐使用 unless-stopped：
    # - 容器崩溃会自动重启
    # - 手动停止后不会自动启动（避免意外启动）
    # - 系统重启后会自动启动容器
    restart: unless-stopped
    
    # ----------------------------------------
    # 健康检查配置
    # ----------------------------------------
    # healthcheck: 定期检查容器是否健康
    # 
    # 为什么需要：
    # - 及时发现容器内服务异常
    # - Docker 可以根据健康状态做出反应（如重启）
    # - 监控系统可以获取健康状态
    healthcheck:
      # test: 健康检查命令
      # CMD 格式：["CMD", "命令", "参数1", "参数2"]
      # 返回 0 表示健康，非 0 表示不健康
      # 
      # 这里检查 go 命令是否存在（验证环境是否正确安装）
      # 你可以改成更复杂的检查，如：
      # - ["CMD", "curl", "-f", "http://localhost:8080/health"]
      # - ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      test: ["CMD", "which", "go"]
      
      # interval: 检查间隔时间
      # 每 30 秒执行一次健康检查
      interval: 30s
      
      # timeout: 单次检查的超时时间
      # 如果 10 秒内没有返回结果，认为检查失败
      timeout: 10s
      
      # retries: 失败重试次数
      # 连续失败 3 次后，容器状态变为 unhealthy
      retries: 3
      
      # start_period: 启动等待时间
      # 容器启动后的前 10 秒内，健康检查失败不计入 retries
      # 给容器一些时间完成初始化
      start_period: 10s
    
    # ----------------------------------------
    # 日志配置
    # ----------------------------------------
    # logging: 容器日志的驱动和选项
    # 
    # 为什么需要配置：
    # - 不限制日志大小会导致磁盘被填满
    # - 日志文件过大会影响 docker logs 命令的性能
    # - 日志轮转可以保留历史日志同时控制大小
    logging:
      # driver: 日志驱动类型
      # 
      # 常用驱动：
      # - json-file: JSON 格式的日志文件（默认）
      # - syslog: 发送到系统日志
      # - journald: 发送到 systemd journal
      # - gelf: 发送到 Graylog
      # - fluentd: 发送到 Fluentd
      # - none: 不记录日志
      driver: "json-file"
      
      # options: 日志驱动的选项
      options:
        # max-size: 单个日志文件的最大大小
        # 达到这个大小后会创建新文件（日志轮转）
        # 10m = 10MB
        max-size: "10m"
        
        # max-file: 保留的日志文件数量
        # 保留最新的 3 个日志文件
        # 总共最多占用 10MB * 3 = 30MB 磁盘空间
        max-file: "3"

# ============================================
# 数据卷定义（顶层配置）
# ============================================
# volumes: 定义命名卷（Named Volumes）
# 
# 命名卷 vs 绑定挂载：
# - 命名卷：由 Docker 管理，数据存储在 Docker 内部目录
#          优点：跨平台、自动管理、性能好
#          缺点：不能直接在宿主机上编辑文件
# 
# - 绑定挂载：直接挂载宿主机目录（如 ./workspace:/workspace）
#            优点：可以在宿主机直接编辑
#            缺点：路径依赖宿主机，跨平台可能有问题
# 
# 使用场景：
# - 需要频繁编辑的文件：用绑定挂载（如 workspace、scripts）
# - 缓存、临时文件：用命名卷（如 go-cache、tool-config）
volumes:
  # Go 模块缓存卷
  # 
  # 存储位置：/var/lib/docker/volumes/go-cache/_data（Linux/Mac）
  # 作用：缓存 go mod download 下载的包
  # 
  # 查看卷信息：docker volume inspect go-cache
  # 清理卷：docker volume rm go-cache
  go-cache:
    driver: local  # 使用本地存储驱动（默认）
  
  # 工具配置卷
  # 
  # 存储位置：/var/lib/docker/volumes/tool-config/_data
  # 作用：缓存工具的配置文件和数据
  # 例如：nuclei 的模板、wordlists 的索引等
  tool-config:
    driver: local  # 使用本地存储驱动

# ============================================
# 网络配置（顶层配置）
# ============================================
# networks: 定义容器网络
# 
# 为什么需要自定义网络：
# - 容器间通信：同一网络的容器可以通过服务名互相访问
# - 网络隔离：不同网络的容器无法互相访问
# - DNS 解析：Docker 提供内置 DNS，可以通过容器名访问
# 
# 网络驱动类型：
# - bridge: 桥接网络（默认），适用于单机容器通信
# - host: 直接使用宿主机网络，性能最好但隔离性差
# - overlay: 跨主机通信（Swarm 集群使用）
# - none: 无网络
networks:
  # default: 默认网络配置
  # 
  # 如果不指定这个配置，Docker Compose 会自动创建一个网络
  # 名称类似：docker_default
  # 
  # 自定义网络名称的好处：
  # - 名称清晰，便于识别
  # - 多个项目可以通过网络名称区分
  default:
    # name: 网络的名称
    # 不指定的话会自动生成类似 docker_default 的名称
    name: xingrin-network
    
    # driver: 网络驱动类型
    # bridge 是最常用的类型，适合单机环境
    driver: bridge
    
    # 其他可选配置（已注释）：
    # ipam:
    #   config:
    #     - subnet: 172.28.0.0/16  # 自定义子网
    # 
    # driver_opts:
    #   com.docker.network.bridge.name: br-vulun  # 自定义网桥名称
