version: '3.8'

services:
  # PostgreSQL（可选，使用远程数据库时不启动）
  # 本地模式: docker compose --profile local-db up -d
  # 远程模式: docker compose up -d（需配置 DB_HOST 为远程地址）
  postgres:
    profiles: ["local-db"]
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/server/Dockerfile
    restart: always
    ports:
      - "${SERVER_PORT}:8888"
      - "${PREFECT_UI_PORT}:4200"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../backend/logs:/app/backend/logs
      - ../backend/results:/app/backend/results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ../backend/logs:/app/backend/logs
      - ../backend/results:/app/backend/results

volumes:
  postgres_data:
